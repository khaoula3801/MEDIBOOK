name: CI/CD MediBook
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install django python-dotenv scikit-learn pillow
      - name: Migrate
        env:
          DEBUG: "True"
          SECRET_KEY: "ci-secret-key"
          ALLOWED_HOSTS: "localhost"
        run: python manage.py migrate
      - name: Test
        env:
          DEBUG: "True"
          SECRET_KEY: "ci-secret-key"
          ALLOWED_HOSTS: "localhost"
        run: python manage.py test
