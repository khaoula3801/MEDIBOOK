name: CI/CD MediBook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: medibook_db
          POSTGRES_USER: medibook_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run migrations
        env:
          DEBUG: 'True'
          SECRET_KEY: 'ci-secret-key'
          DB_NAME: medibook_db
          DB_USER: medibook_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: '5432'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
        run: python manage.py migrate

      - name: Run tests
        env:
          DEBUG: 'True'
          SECRET_KEY: 'ci-secret-key'
          DB_NAME: medibook_db
          DB_USER: medibook_user
          DB_PASSWORD: testpassword
          DB_HOST: localhost
          DB_PORT: '5432'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
        run: python manage.py test

      - name: Lint
        run: flake8 . --max-line-length=120 --exclude=migrations,venv,.git

  build:
    name: Build Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/medibook:latest