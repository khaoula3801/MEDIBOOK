<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediBook{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 MediBook</a>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'ai_orientation:orientation' %}">
                    🤖 Orientation IA
                </a>
                <a class="nav-link" href="{% url 'dashboard:index' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'logout' %}">Déconnexion</a>
            {% else %}
                <a class="nav-link" href="{% url 'doctors:list' %}">Médecins</a>
                <a class="nav-link" href="{% url 'accounts:login' %}">Connexion</a>
                <a class="nav-link" href="{% url 'accounts:register' %}">S'inscrire</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
