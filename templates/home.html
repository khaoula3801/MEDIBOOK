{% extends 'base.html' %}
{% block title %}MediBook - Accueil{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-4">🏥 Bienvenue sur MediBook</h1>
    <p class="lead text-muted">
        Plateforme intelligente de gestion de rendez-vous médicaux
    </p>
    <div class="mt-4">
        <a href="{% url 'doctors:list' %}" class="btn btn-primary btn-lg me-3">
            🔍 Trouver un médecin
        </a>
        {% if not user.is_authenticated %}
        <a href="{% url 'accounts:register' %}" class="btn btn-success btn-lg">
            📝 S'inscrire
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
